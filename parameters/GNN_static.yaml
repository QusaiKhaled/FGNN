group: 2018_2019_Static

parameters:
  seed: [42]

  training:
    batch_size: [256]
    epochs: [1000]
    num_workers: [8]
    learning_rate: [0.01, 0.001, 0.0001, 0.0001]
    patience: [20]
    scheduler:
      name: [ReduceLROnPlateau]
      mode: [max]
      factor: [0.5]
      patience: [3]
      threshold: [0.0001]
      threshold_mode: [rel]
    
  dataset:
    path: [Data/Water_Graph_dist_static_1819.pt]
    window_size: [12, 24, 48]
    stride: [0.3]
    split: [year] # Split the dataset by year
    train_ratio: [0.8]
    val_ratio: [0.2]

  model:
    name: [GNN]
    hidden_dim: [128]
    latent_dim: [32]
    depth: [8, 16]
    dropout: [0.3]

  loss:
    -
      name: BCEWithLogitsLoss

other_grids:
