group: FuzzyExperiments

parameters:
  seed: [42]

  training:
    batch_size: [2048]
    epochs: [1]
    num_workers: [8]
    learning_rate: [0.001]
    patience: [20]
    scheduler:
      name: [ReduceLROnPlateau]
      mode: [max]
      factor: [0.5]
      patience: [3]
      threshold: [0.0001]
      threshold_mode: [rel]
    
  dataset:
    path: [Data/Water_Graph_dist.pt]
    window_size: [12, 24]
    stride: [0.3]

    fuzzy:
      n_clusters: [3]

  model:
    name: [GNN]
    hidden_dim: [32, 64, 128]
    latent_dim: [32]
    depth: [8, 16]
    dropout: [0.3]

  loss:
    -
      name: BCEWithLogitsLoss

other_grids:
