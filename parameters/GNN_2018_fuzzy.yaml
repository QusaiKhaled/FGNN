group: FuzzyExperiments

parameters:
  seed: [42]

  training:
    # batch_size: [1024]
    batch_size: [32]
    epochs: [1000]
    num_workers: [8]
    learning_rate: [0.001]
    patience: [50]
    scheduler:
      name: [ReduceLROnPlateau]
      mode: [max]
      factor: [0.5]
      patience: [3]
      threshold: [0.0001]
      threshold_mode: [rel]
    
  dataset:
    path: [Data/Water_Graph_dist.pt]
    # window_size: [12, 24]
    window_size: [8]
    stride: [0.3]

    fuzzy:
      # n_clusters: [3]
      n_clusters: [5]

  model:
    name: [GNN]
    # hidden_dim: [32, 64, 128]
    hidden_dim: [1024]
    latent_dim: [1024]
    depth: [8]
    dropout: [0.3]

  loss:
    -
      name: BCEWithLogitsLoss

other_grids:
