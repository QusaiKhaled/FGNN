group: SensorDrift

parameters:
  seed: [42]

  training:
    batch_size: [8]
    epochs: [1000]
    num_workers: [8]
    learning_rate: [0.001]
    patience: [20]
    scheduler:
      name: [ReduceLROnPlateau]
      mode: [max]
      factor: [0.5]
      patience: [3]
      threshold: [0.0001]
      threshold_mode: [rel]
    
  dataset:
    path: [Data/Water_Graph_dist_drift.pt]
    window_size: [12, 24, 48]
    stride: [0.3]

  model:
    name: [GNN]
    hidden_dim: [32, 64, 128]
    latent_dim: [32]
    depth: [2, 4, 8, 16, 32]
    dropout: [0.3]

  loss:
    -
      name: Focal
      alpha: 0.25
      gamma: 2.0
    -
      name: BCEWithLogitsLoss

other_grids:
